name: Check for Broken Links

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '7 3 * * 0'

permissions:
  issues: read

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.9
        uses: actions/setup-python@v6
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jinja2
          pip install requests
      - name: create HTML file

        run: |
          python create_tool_landing_page.py dev_config.json
          python create_catalog_landing_page.py dev_config.json
          python create_site_index_page.py dev_config.json

      - name: Check for broken links, exclude some false positive paths
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --accept '200, 302, 401..=403' ./deploy --verbose
          fail: true

      